<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css">
    <title>Protótipo Sprint 2</title>
</head>
<body>
    <header>
        <div class="grupoBotoes">
            <button class="botoes">📚</button>
            <button class="botoes">🔎</button>
        </div>
        <div>
            <button id="lanterna">💡</button>
        </div>
    </header>

    <main>
        <video id="cameraPreview" autoplay muted playsinline></video>
        <canvas id="canvasCamera" hidden></canvas>
    </main>

    <footer>
        <div id="fotoVideo">
            <button id="foto">Foto</button>
            <button id="modoVideo">Vídeo</button>
        </div>
        <div>
            <button id="tirarFoto" aria-label="Tirar foto"></button>
        </div>
        <p id="resultadoCamera" aria-live="polite"></p>
    </footer>

    <script src="./src/js/script.js"></script>
</body>
</html>
